// Sheet (see GOOGLE_SHEETS_SETUP.md). GAS_URL/GAS_KEY come from that setup —
// GAS_KEY is a shared secret checked by the script, not a Google credential.
const GAS_URL = 'https://script.google.com/macros/s/AKfycbxr2V3_lEzNyragNn-Ycr2cfzanW6SwhurJVLLBglaLloPM8djtTU13TlLje4FD_ejJfw/exec';
const GAS_KEY = 'ed1336dec5ab0e0b16a04ef52c45bf2ba3f143cb5ee0eb38';

function esc(v){
  return String(v).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function normalize(s){ return (s||'').toLowerCase().replace(/[.\-\/\s]/g,''); }
function toBn(str){ return String(str).replace(/[0-9]/g, d=>BN_DIGITS[d]); }
function fmtNum(n, lang){ const s=String(n); return lang==='bn'? toBn(s) : s; }
function fmtDate(iso, lang){
  const [y,m,d] = iso.split('-');
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const disp = `${parseInt(d,10)} ${months[parseInt(m,10)-1]} ${y}`;
  return lang==='bn'? toBn(disp) : disp;
}
function todayISO(){
  const d = new Date();
  const p = x=>String(x).padStart(2,'0');
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`;
}
function fmtTime(iso, lang){
  if(!iso) return '';
  const d = new Date(iso);
  let h = d.getHours(); const m = d.getMinutes();
  const ampm = h>=12 ? 'PM' : 'AM';
  h = h%12; if(h===0) h=12;
  const disp = `${h}:${String(m).padStart(2,'0')} ${ampm}`;
  return lang==='bn' ? toBn(disp) : disp;
}

function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw){
      const saved = JSON.parse(raw);
      if(saved && Array.isArray(saved.medicines)){
        return {
          medicines: saved.medicines,
          entries: Array.isArray(saved.entries) ? saved.entries : [],
          recentMedIds: Array.isArray(saved.recentMedIds) ? saved.recentMedIds : [],
          lastEntryId: saved.lastEntryId || null,
          lang: saved.lang === 'bn' ? 'bn' : 'en',
          dark: !!saved.dark,
          activityLog: Array.isArray(saved.activityLog) ? saved.activityLog : [],
        };
      }
    }
  }catch(e){}
  return {
    medicines: MEDICINES_SEED.map(m=>({...m})),
    entries: ENTRIES_SEED.map(e=>({...e})),
    recentMedIds: [...RECENT_SEED], lastEntryId: LAST_ENTRY_SEED,
    lang:'en', dark:false, activityLog: [],
  };
}
function persist(){
  const payload = {
    medicines: state.medicines, entries: state.entries, recentMedIds: state.recentMedIds,
    lastEntryId: state.lastEntryId, lang: state.lang, dark: state.dark, activityLog: state.activityLog,
  };
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(payload)); }catch(e){}
  if(GAS_URL.includes('REPLACE-WITH')) return; // Apps Script URL not filled in yet
  const register = buildRegisterRows(state.entries);
  fetch(GAS_URL, {
    method: 'POST',
    // text/plain avoids a CORS preflight (which Apps Script Web Apps don't handle);
    // the script parses e.postData.contents as JSON itself.
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify({ key: GAS_KEY, ...payload, register }),
  }).catch(()=>{}); // offline/unreachable: localStorage write above already happened
}
function syncFromServer(){
  if(GAS_URL.includes('REPLACE-WITH')) return; // Apps Script URL not filled in yet
  fetch(`${GAS_URL}?key=${encodeURIComponent(GAS_KEY)}`)
    .then(r => r.ok ? r.json() : null)
    .then(saved => {
      if(saved && Array.isArray(saved.medicines) && saved.medicines.length){
        state.medicines = saved.medicines;
        state.entries = Array.isArray(saved.entries) ? saved.entries : [];
        state.recentMedIds = Array.isArray(saved.recentMedIds) ? saved.recentMedIds : [];
        state.lastEntryId = saved.lastEntryId || null;
        state.lang = saved.lang === 'bn' ? 'bn' : state.lang;
        state.dark = typeof saved.dark === 'boolean' ? saved.dark : state.dark;
        state.activityLog = Array.isArray(saved.activityLog) ? saved.activityLog : [];
        try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(saved)); }catch(e){}
        render();
      } else if(saved && Array.isArray(saved.medicines) && !saved.medicines.length){
        persist(); // sheet has no data yet: push this device's current/seed state as the shared copy
      }
    })
    .catch(()=>{}); // offline: keep whatever loadState() already put on screen
}

const app = document.getElementById('app');

  tab:'entry', isLoading:true, query:'', showAllList:false,
  sheet:null, sheetMedId:null, entryType:'out', qtyStr:'', dateStr:'',

  dayDrill:null, dateOverrides:{},
  editSheet:null, editMedId:null, editEntryId:null,
  editNameStr:'', editStockStr:'', editQtyStr:'', editTypeStr:'out', editDateStr:'', editError:'',
}, loadState());

let pendingFocus = null; // CSS selector to focus after the next render, overriding auto-restore
let focusStack = []; // stack of selectors for elements that opened nested modals; popped on close
function focusSelectorFor(el){
  if(!el || !el.dataset) return null;
  if(el.dataset.field) return `[data-field="${el.dataset.field}"]`;
  if(el.dataset.action){
    return el.dataset.id != null
      ? `[data-action="${el.dataset.action}"][data-id="${el.dataset.id}"]`
      : `[data-action="${el.dataset.action}"]`;
  }
  return null;
}

let toastTimer = null;
function setToast(msg, negative){
  clearTimeout(toastTimer);
  state.toast = {msg, negative};
  toastTimer = setTimeout(()=>{ state.toast = null; render(); }, 2600);
}

function isModalOpen(){ return !!(state.sheet || state.dayDrill || state.editSheet); }

const EDIT_WINDOW_MS = 24*60*60*1000;
function isEditableEntry(e){
  return !!e.createdAt && (Date.now() - new Date(e.createdAt).getTime()) < EDIT_WINDOW_MS;
}

function logActivity(summary){
  state.activityLog.push({ id:'a'+Date.now()+'_'+Math.random().toString(36).slice(2,7), ts:new Date().toISOString(), summary });
  if(state.activityLog.length > 2000) state.activityLog = state.activityLog.slice(-2000);
}

// Recomputes prevStock/stockAfter for every entry of a medicine, in original creation order,
// anchored to the first entry's prevStock; updates the medicine's current stock to the final total.
function recalcMedicineChain(medId){
  const list = state.entries.filter(e=>e.medId===medId);
  if(!list.length) return;
  let running = list[0].prevStock;
  list.forEach(e=>{
    e.prevStock = running;
    running = e.type==='in' ? running+e.qty : running-e.qty;
    e.stockAfter = running;
  });
  const med = state.medicines.find(m=>m.id===medId);
  if(med) med.stock = running;
}

// Simulates the chain for a medicine with one entry's qty/type overridden, without mutating state.
// Returns the final stock and the minimum stock reached at any point in the chain.
function simulateChain(medId, overrideEntryId, overrideQty, overrideType){
  const list = state.entries.filter(e=>e.medId===medId);
  let running = list.length ? list[0].prevStock : 0;
  let minStock = Infinity;
  list.forEach(e=>{
    const qty = e.id===overrideEntryId ? overrideQty : e.qty;
    const type = e.id===overrideEntryId ? overrideType : e.type;
    running = type==='in' ? running+qty : running-qty;
    if(running < minStock) minStock = running;
  });
  if(minStock === Infinity) minStock = running;
  return { finalStock: running, minStock };
}

function decorate(m, C, L, lang){
  const isLow = m.stock < LOW_STOCK_THRESHOLD;
  const colors = isLow ? {bg:C.negativeBg,text:C.negativeText} : {bg:C.positiveBg,text:C.positiveText};
  return {
    id:m.id, name:m.name,
    stockDisplay: fmtNum(m.stock, lang),
    usageDisplay: L.usage(fmtNum(m.usage, lang)),
    badgeBg: colors.bg, badgeText: colors.text,
  };
}

function computeVM(){
  const { medicines, entries, query, showAllList, tab, dark, lang, sheet, sheetMedId, entryType, qtyStr, dateStr,
    addName, addStockStr, addError, dayFilter, toast, recentMedIds, dayDrill,
    editSheet, editMedId, editEntryId, editNameStr, editStockStr, editQtyStr, editTypeStr, editDateStr, editError } = state;
  const C = dark ? DARK : LIGHT;
  const L = TRANSLATIONS[lang];
  const today = todayISO();
  const hasQuery = query.trim().length > 0;
  const nq = normalize(query);
  const sortedAll = medicines.slice().sort((a,b)=>a.name.localeCompare(b.name));
  const searchResults = hasQuery ? sortedAll.filter(m=>normalize(m.name).includes(nq)) : [];
  const mainSource = hasQuery ? searchResults : sortedAll;
  const visibleMain = hasQuery ? mainSource : (showAllList ? mainSource : mainSource.slice(0,40));
  const mainRows = visibleMain.map(m=>decorate(m,C,L,lang));

  const recentSource = hasQuery ? [] : recentMedIds.map(id=>medicines.find(m=>m.id===id)).filter(Boolean).slice(0,20);
  const recentRows = recentSource.map(m=>decorate(m,C,L,lang));

  const noResults = hasQuery && searchResults.length===0;
  const hasRecent = !hasQuery && recentRows.length>0;
  const hasMainRows = mainRows.length>0;
  const showToggleBtn = !hasQuery && mainSource.length>40;
  const listHeading = hasQuery ? L.results(fmtNum(searchResults.length,lang)) : L.allMeds;
  const toggleBtnLabel = showAllList ? L.showLess : L.showRemaining(fmtNum(Math.max(0,mainSource.length-40),lang));

  // Daily serial numbers: 1-based, per date, in original creation order (across all medicines).
  const serialByEntryId = {};
  {
    const byDate = {};
    entries.forEach(e=>{ (byDate[e.date] = byDate[e.date]||[]).push(e); });
    Object.keys(byDate).forEach(d=>{ byDate[d].forEach((e,idx)=>{ serialByEntryId[e.id] = idx+1; }); });
  }

  const lastEntry = entries.find(e=>e.id===state.lastEntryId);

  const filteredEntries = dayFilter ? entries.filter(e=>e.date===dayFilter) : entries;
  const groupsMap = {};
  filteredEntries.forEach(e=>{ (groupsMap[e.date] = groupsMap[e.date]||[]).push(e); });
  const dayGroupsRaw = Object.keys(groupsMap).sort((a,b)=>b.localeCompare(a)).map(date=>{
    const rawList = groupsMap[date].slice().reverse(); // newest first
    const totalIn = rawList.filter(e=>e.type==='in').reduce((s,e)=>s+e.qty,0);
    const totalOut = rawList.filter(e=>e.type==='out').reduce((s,e)=>s+e.qty,0);

    const byMed = {};
    const order = [];
    rawList.forEach(e=>{
      let g = byMed[e.medId];
      if(!g){
        g = { medId:e.medId, medName:e.medName, totalIn:0, totalOut:0, stockAfter:e.stockAfter, count:0 };
        byMed[e.medId] = g;
        order.push(e.medId);
      }
      if(e.type==='in') g.totalIn += e.qty; else g.totalOut += e.qty;
      g.count += 1;
    });

    const rows = order.map(medId=>{
      const g = byMed[medId];
      const parts = [];
      if(g.totalIn>0) parts.push('+'+fmtNum(g.totalIn,lang));
      if(g.totalOut>0) parts.push('−'+fmtNum(g.totalOut,lang));
      return {
        medId: g.medId, medName: g.medName,
        qtyDisplay: parts.join(' / '),
        stockAfterDisplay: fmtNum(g.stockAfter,lang),
        psColor: g.stockAfter<0 ? C.negativeText : C.textMuted,
        isLast: !!lastEntry && lastEntry.date===date && lastEntry.medId===medId,
        countDisplay: L.entryCountShort(fmtNum(g.count,lang)),
        drillId: date+'__'+medId,
      };
    });

    return {
      date, dateDisplay: fmtDate(date, lang),
      totalIn: fmtNum(totalIn,lang), totalOut: fmtNum(totalOut,lang), count: fmtNum(rawList.length,lang),
      rows,
    };
  });
  const mostRecentDate = dayGroupsRaw.length ? dayGroupsRaw[0].date : null;
  const dayGroups = dayGroupsRaw.map(grp=>({
    ...grp,
    expanded: (grp.date in state.dateOverrides) ? state.dateOverrides[grp.date] : (grp.date === mostRecentDate),
  }));
  const daybookEmpty = dayGroups.length===0;

  // Drill-down: individual raw entries for one date+medicine.
  let dayDrillTitle = '', dayDrillRows = [];
  if(dayDrill){
    const med = medicines.find(m=>m.id===dayDrill.medId);
    dayDrillTitle = (med ? med.name : '') + ' · ' + fmtDate(dayDrill.date, lang);
    const list = entries.filter(e=>e.date===dayDrill.date && e.medId===dayDrill.medId);
    dayDrillRows = list.slice().reverse().map(e=>({
      id: e.id,
      serialDisplay: '#'+fmtNum(serialByEntryId[e.id],lang),
      typeLabel: e.type==='in' ? L.in : L.out,
      qtyDisplay: (e.type==='in'?'+':'−')+fmtNum(e.qty,lang),
      stockAfterDisplay: fmtNum(e.stockAfter,lang),
      timeDisplay: fmtTime(e.createdAt, lang),
      signColor: e.type==='in' ? C.positiveText : C.text,
      editable: isEditableEntry(e),
    }));
  }

  // Entry sheet (In/Out save).
  let sheetMedName='', sheetCurrentStockDisplay='', sheetStockColor='', warnVisible=false, warnText='', showPreview=false, previewText='', saveDisabled=true;
  if(sheet==='entry' && sheetMedId){
    const med = medicines.find(m=>m.id===sheetMedId);
    if(med){
      const qtyNum = parseInt(qtyStr,10)||0;
      const newStock = entryType==='in' ? med.stock+qtyNum : med.stock-qtyNum;
      const isFutureDate = dateStr > today;
      const wouldGoNegative = qtyNum>0 && newStock<0;
      sheetMedName = med.name;
      sheetCurrentStockDisplay = fmtNum(med.stock,lang);
      sheetStockColor = med.stock<=0 ? C.negativeText : C.positiveText;
      warnVisible = isFutureDate || wouldGoNegative;
      warnText = isFutureDate ? L.futureDateError : (wouldGoNegative ? L.negativeBlockError(fmtNum(newStock,lang)) : '');
      showPreview = qtyNum>0 && !warnVisible;
      previewText = L.newStockPreview(fmtNum(newStock,lang));
      saveDisabled = qtyNum<=0 || isFutureDate || wouldGoNegative;
    }
  }

  const outSelected = entryType==='out';
  const outBg = outSelected ? C.primary : C.surfaceAlt;
  const outText = outSelected ? C.selectedText : C.text;
  const outBorder = outSelected ? C.primary : C.border;
  const inBg = !outSelected ? C.primary : C.surfaceAlt;
  const inText = !outSelected ? C.selectedText : C.text;
  const inBorder = !outSelected ? C.primary : C.border;
  const saveBtnBg = saveDisabled ? C.border : C.primary;
  const saveBtnColor = saveDisabled ? C.textMuted : C.selectedText;

  // Edit-medicine form.
  let editMedName = '', editMedSaveDisabled = true;
  if(editSheet==='medicine' && editMedId){
    editMedName = (medicines.find(m=>m.id===editMedId) || {}).name || '';
    editMedSaveDisabled = editNameStr.trim()==='';
  }

  // Edit-entry form.
  let editEntryMedName = '', editEntrySaveDisabled = true, editEntryWarnVisible = false, editEntryWarnText = '', editEntryPreview = '';
  if(editSheet==='entry' && editEntryId){
    const e = entries.find(x=>x.id===editEntryId);
    if(e){
      editEntryMedName = e.medName;
      const qtyNum = parseInt(editQtyStr,10)||0;
      const isFutureDate = editDateStr > today;
      const sim = simulateChain(e.medId, editEntryId, qtyNum, editTypeStr);
      const wouldGoNegative = qtyNum>0 && sim.minStock<0;
      editEntryWarnVisible = isFutureDate || wouldGoNegative;
      editEntryWarnText = isFutureDate ? L.futureDateError : (wouldGoNegative ? L.negativeBlockError(fmtNum(sim.finalStock,lang)) : '');
      editEntryPreview = (!editEntryWarnVisible && qtyNum>0) ? L.newStockPreview(fmtNum(sim.finalStock,lang)) : '';
      editEntrySaveDisabled = qtyNum<=0 || isFutureDate || wouldGoNegative;
    }
  }
  const editOutSelected = editTypeStr==='out';
  const editOutBg = editOutSelected ? C.primary : C.surfaceAlt;
  const editOutText = editOutSelected ? C.selectedText : C.text;
  const editOutBorder = editOutSelected ? C.primary : C.border;
  const editInBg = !editOutSelected ? C.primary : C.surfaceAlt;
  const editInText = !editOutSelected ? C.selectedText : C.text;
  const editInBorder = !editOutSelected ? C.primary : C.border;

  // Activity log tab.
  const logRows = state.activityLog.slice().reverse().map(a=>({
    id: a.id, summary: a.summary,
    whenDisplay: fmtDate(a.ts.slice(0,10), lang) + ' · ' + fmtTime(a.ts, lang),
  }));
  const logEmpty = logRows.length===0;

  const toastVisible = !!toast;
  const toastMsg = toast ? toast.msg : '';
  const toastBg = toast && toast.negative ? '#B23A2E' : '#1F7A44';
  const toastColor = '#ffffff';

  const isEntryTab = tab==='entry';
  const isDaybookTab = tab==='daybook';
  const isLogTab = tab==='log';
  const entryTabBg = isEntryTab ? C.pageBg : 'transparent';
  const entryTabColor = isEntryTab ? C.primary : C.headerMuted;
  const daybookTabBg = isDaybookTab ? C.pageBg : 'transparent';
  const daybookTabColor = isDaybookTab ? C.primary : C.headerMuted;
  const logTabBg = isLogTab ? C.pageBg : 'transparent';
  const logTabColor = isLogTab ? C.primary : C.headerMuted;

  return {
    C, L, dark, lang,
    langLabel: lang==='en' ? 'বাংলা' : 'EN',
    todayDisplay: fmtDate(today, lang), todayISO: today,
    totalCountDisplay: fmtNum(medicines.length, lang),
    daybookCountDisplay: fmtNum(entries.length, lang),
    logCountDisplay: fmtNum(state.activityLog.length, lang),
    isEntryTab, isDaybookTab, isLogTab, entryTabBg, entryTabColor, daybookTabBg, daybookTabColor, logTabBg, logTabColor,
    query, hasQuery,
    hasRecent, recentRows,
    listHeading, noResults, noResultsText: L.noResults(query),
    hasMainRows, mainRows, showToggleBtn, toggleBtnLabel,
    dayFilter, hasDayFilter: !!dayFilter,
    daybookEmpty, dayGroups,
    dayDrillOpen: !!dayDrill, dayDrillTitle, dayDrillRows,
    sheetEntryOpen: sheet==='entry' && !editSheet, sheetAddOpen: sheet==='add' && !editSheet,
    sheetMedId, sheetMedName, sheetCurrentStockDisplay, sheetStockColor,
    outBg, outText, outBorder, inBg, inText, inBorder,
    qtyStr, dateStr,
    warnVisible, warnText, showPreview, previewText,
    saveDisabled, saveBtnBg, saveBtnColor,
    addName, addStockStr, addError, hasAddError: !!addError, addSaveDisabled: addName.trim()==='',
    editMedicineOpen: editSheet==='medicine', editEntryOpen: editSheet==='entry',
    editMedName, editNameStr, editStockStr, editMedSaveDisabled,
    editError, hasEditError: !!editError,
    editEntryMedName, editQtyStr, editDateStr, editEntrySaveDisabled,
    editOutBg, editOutText, editOutBorder, editInBg, editInText, editInBorder,
    editEntryWarnVisible, editEntryWarnText, editEntryPreview,
    logRows, logEmpty,
    toastVisible, toastMsg, toastBg, toastColor,
  };
}

function render(){
  const active = document.activeElement;
  let restore = null;
  if(active && app.contains(active) && active.dataset){
    if(active.dataset.field){
      restore = { type:'field', field: active.dataset.field, start: active.selectionStart, end: active.selectionEnd };
    } else if(active.dataset.action){
      restore = { type:'action', action: active.dataset.action, id: active.dataset.id };
    }
  }

  app.innerHTML = buildAppHTML();

  if(pendingFocus){
    const sel = pendingFocus;
    pendingFocus = null;
    const el = app.querySelector(sel);
    if(el){ el.focus(); return; }
  }
  if(restore){
    const sel = restore.type==='field' ? `[data-field="${restore.field}"]` : focusSelectorFor({dataset:{action:restore.action, id:restore.id}});
    const el = app.querySelector(sel);
    if(el){
      el.focus();
      if(restore.type==='field' && typeof el.setSelectionRange === 'function' && restore.start != null){
        try{ el.setSelectionRange(restore.start, restore.end); }catch(err){}
      }
    }
  }
}

// Builds the "Sheet1" register grid: one row per medicine, an Opening Balance column,
// then one In/Out/Present-Stock column block per date that had any activity, ending
// with a Month/Closing Balance column — matching the user's existing khata-register format.
// Plain 2D array of the "side-by-side" pivot register (Medicine Name, Opening
// Balance, then In/Out/Present-Stock triplets per date). Shared by the xlsx
// export and the Google Sheets sync, so both always show the identical layout.
function buildRegisterRows(entries){
  const medicines = state.medicines.slice().sort((a,b)=>a.name.localeCompare(b.name));

  const dates = Array.from(new Set(entries.map(e=>e.date))).sort();

  const perMedDateTotals = {}; // medId -> date -> {in,out}
  const openingByMed = {}; // medId -> prevStock of that medicine's earliest entry
  entries.forEach(e=>{
    if(!perMedDateTotals[e.medId]) perMedDateTotals[e.medId] = {};
    const d = perMedDateTotals[e.medId][e.date] || {in:0,out:0};
    if(e.type==='in') d.in += e.qty; else d.out += e.qty;
    perMedDateTotals[e.medId][e.date] = d;
    if(!(e.medId in openingByMed)) openingByMed[e.medId] = e.prevStock;
  });

  const headerRow1 = ['Medicine Name','','Opening Balance'];
  const headerRow2 = ['','',''];
  dates.forEach((d,i)=>{
    headerRow1.push(d,'','');
    headerRow2.push('In','Out', i===0 ? 'Present Stock' : 'PS');
  });
  headerRow1.push('Month Closing Balance');
  headerRow2.push('');

  const rows = [headerRow1, headerRow2];
  medicines.forEach(m=>{
    const opening = (m.id in openingByMed) ? openingByMed[m.id] : m.stock;
    const row = [m.name, '', opening];
    let running = opening;
    dates.forEach(d=>{
      const t = perMedDateTotals[m.id] && perMedDateTotals[m.id][d];
      if(t){
        running = running + t.in - t.out;
        row.push(t.in || '', t.out || '', running);
      } else {
        row.push('', '', running);
      }
    });
    row.push(running);
    rows.push(row);
  });

  return { rows, dates };
}

function buildRegisterSheet(entries){
  const { rows, dates } = buildRegisterRows(entries);
  const ws = XLSX.utils.aoa_to_sheet(rows);

  const merges = [
    {s:{r:0,c:0}, e:{r:1,c:0}}, // Medicine Name
    {s:{r:0,c:2}, e:{r:1,c:2}}, // Opening Balance
  ];
  let col = 3;
  dates.forEach(()=>{ merges.push({s:{r:0,c:col}, e:{r:0,c:col+2}}); col += 3; });
  merges.push({s:{r:0,c:col}, e:{r:1,c:col}}); // Month Closing Balance
  ws['!merges'] = merges;

  ws['!cols'] = [{wch:28},{wch:6},{wch:14}]
    .concat(dates.flatMap(()=>[{wch:8},{wch:8},{wch:10}]))
    .concat([{wch:16}]);

  dates.forEach((d,i)=>{
    const addr = XLSX.utils.encode_cell({r:0, c:3+i*3});
    ws[addr] = { t:'d', v:new Date(d+'T00:00:00'), z:'d-mmm-yy' };
  });

  return ws;
}

function doExport(){
  if(typeof XLSX === 'undefined'){
    setToast(TRANSLATIONS[state.lang].exportError, true);
    render();
    return;
  }
  const filtered = !!state.dayFilter;
  const exportEntries = filtered ? state.entries.filter(e=>e.date===state.dayFilter) : state.entries;

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, buildRegisterSheet(exportEntries), 'Sheet1');

  const entriesSorted = exportEntries.slice().sort((a,b)=> a.date===b.date ? 0 : (a.date<b.date?-1:1));
  const entrySheet = XLSX.utils.json_to_sheet(entriesSorted.map(e=>({
    Date: e.date, Medicine: e.medName, Type: e.type==='in'?'In':'Out', Quantity: e.qty, 'Stock After': e.stockAfter,
    Time: e.createdAt ? fmtTime(e.createdAt, 'en') : '',
  })));
  XLSX.utils.book_append_sheet(wb, entrySheet, 'Entries');

  const filenameSuffix = filtered ? `${state.dayFilter}_filtered` : todayISO();
  XLSX.writeFile(wb, `PMC_Stock_Register_${filenameSuffix}.xlsx`);
  setToast(TRANSLATIONS[state.lang].exportDone, false);
  render();
}

const ACTIONS = {
  toggleLang(){ state.lang = state.lang==='en' ? 'bn' : 'en'; persist(); render(); },
  toggleDark(){ state.dark = !state.dark; persist(); render(); },
  setTabEntry(){ state.tab = 'entry'; render(); },
  setTabDaybook(){ state.tab = 'daybook'; render(); },
  setTabLog(){ state.tab = 'log'; render(); },
  exportClick(){ doExport(); },
  openAdd(){
    focusStack.push(focusSelectorFor(document.activeElement));
    state.sheet = 'add'; state.addName = state.query; state.addStockStr = ''; state.addError = '';
    pendingFocus = '[data-field="addName"]';
    render();
  },
  openEntry(id){
    focusStack.push(focusSelectorFor(document.activeElement));
    state.sheet = 'entry'; state.sheetMedId = id; state.entryType = 'out'; state.qtyStr = ''; state.dateStr = todayISO(); state.addError = '';
    pendingFocus = '[data-field="qty"]';
    render();
  },
  closeSheet(){
    state.sheet = null; state.sheetMedId = null; state.addError = '';
    pendingFocus = focusStack.pop() || '[data-field="query"]';
    render();
  },
  setTypeOut(){ state.entryType = 'out'; render(); },
  setTypeIn(){ state.entryType = 'in'; render(); },
  toggleShowAll(){ state.showAllList = !state.showAllList; render(); },
  clearDayFilter(){ state.dayFilter = ''; render(); },
  toggleDayGroup(date){
    const vm = computeVM();
    const grp = vm.dayGroups.find(g=>g.date===date);
    const currentlyExpanded = grp ? grp.expanded : false;
    state.dateOverrides = {...state.dateOverrides, [date]: !currentlyExpanded};
    render();
  },
  closeModal(){
    if(state.editSheet){ ACTIONS.closeEdit(); return; }
    if(state.sheet){ ACTIONS.closeSheet(); return; }
    if(state.dayDrill){ ACTIONS.closeDayDrill(); return; }
  },
  openDayDrill(compound){
    focusStack.push(focusSelectorFor(document.activeElement));
    const [date, medId] = compound.split('__');
    state.dayDrill = { date, medId };
    pendingFocus = '[data-action="closeDayDrill"]';
    render();
  },
  closeDayDrill(){
    state.dayDrill = null;
    pendingFocus = focusStack.pop() || '[data-field="dayFilter"]';
    render();
  },
  openEditMedicine(id){
    const med = state.medicines.find(m=>m.id===id);
    if(!med) return;
    focusStack.push(focusSelectorFor(document.activeElement));
    state.editSheet = 'medicine'; state.editMedId = id;
    state.editNameStr = med.name; state.editStockStr = String(med.stock); state.editError = '';
    pendingFocus = '[data-field="editName"]';
    render();
  },
  deleteMedicine(id){
    const med = state.medicines.find(m=>m.id===id);
    if(!med) return;
    const lang = state.lang;
    const L = TRANSLATIONS[lang];
    if(!window.confirm(L.confirmDeleteMedicine(med.name))) return;
    state.medicines = state.medicines.filter(m=>m.id!==id);
    const removedEntryIds = new Set(state.entries.filter(e=>e.medId===id).map(e=>e.id));
    state.entries = state.entries.filter(e=>e.medId!==id);
    state.recentMedIds = state.recentMedIds.filter(x=>x!==id);
    if(state.lastEntryId && removedEntryIds.has(state.lastEntryId)){
      state.lastEntryId = state.entries.length ? state.entries[state.entries.length-1].id : null;
    }
    logActivity(L.logDeleteMedicine(med.name));
    setToast(L.medicineDeletedToast, false);
    state.sheet = null; state.sheetMedId = null; state.editSheet = null; state.editMedId = null;
    pendingFocus = '[data-field="query"]';
    focusStack.length = 0;
    persist();
    render();
  },
  deleteLogEntry(id){
    if(!window.confirm(TRANSLATIONS[state.lang].confirmDeleteLog)) return;
    state.activityLog = state.activityLog.filter(a=>a.id!==id);
    persist();
    render();
  },
  openEditEntry(id){
    const e = state.entries.find(x=>x.id===id);
    if(!e || !isEditableEntry(e)) return;
    focusStack.push(focusSelectorFor(document.activeElement));
    state.editSheet = 'entry'; state.editEntryId = id;
    state.editQtyStr = String(e.qty); state.editTypeStr = e.type; state.editDateStr = e.date; state.editError = '';
    pendingFocus = '[data-field="editQty"]';
    render();
  },
  deleteEntry(id){
    const e = state.entries.find(x=>x.id===id);
    if(!e || !isEditableEntry(e)) return;
    const lang = state.lang;
    const L = TRANSLATIONS[lang];
    if(!window.confirm(L.confirmDeleteEntry)) return;
    const typeLabel = e.type==='in' ? L.in : L.out;
    const medId = e.medId, date = e.date;
    state.entries = state.entries.filter(x=>x.id!==id);
    recalcMedicineChain(medId);
    if(state.lastEntryId===id){
      state.lastEntryId = state.entries.length ? state.entries[state.entries.length-1].id : null;
    }
    logActivity(L.logDeleteEntry(typeLabel, e.medName, fmtNum(e.qty,lang)));
    setToast(L.deletedToast, false);
    persist();
    const remaining = state.entries.some(x=>x.date===date && x.medId===medId);
    if(!remaining && state.dayDrill && state.dayDrill.date===date && state.dayDrill.medId===medId){
      ACTIONS.closeDayDrill();
    } else {
      pendingFocus = '[data-action="closeDayDrill"]';
      render();
    }
  },
  closeEdit(){
    state.editSheet = null; state.editMedId = null; state.editEntryId = null; state.editError = '';
    pendingFocus = focusStack.pop() || (state.dayDrill ? '[data-action="closeDayDrill"]' : '[data-field="query"]');
    render();
  },
  setEditTypeOut(){ state.editTypeStr = 'out'; render(); },
  setEditTypeIn(){ state.editTypeStr = 'in'; render(); },
  undo(){
    const { entries, lastEntryId, medicines, lang } = state;
    const idx = entries.findIndex(e=>e.id===lastEntryId);
    if(idx<0) return;
    const entry = entries[idx];
    const medIdx = medicines.findIndex(m=>m.id===entry.medId);
    if(medIdx>=0){
      const m = medicines[medIdx];
      medicines[medIdx] = {...m, stock:entry.prevStock, usage:Math.max(0,m.usage-1)};
    }
    state.entries = entries.filter(e=>e.id!==lastEntryId);
    state.lastEntryId = state.entries.length ? state.entries[state.entries.length-1].id : null;
    const L = TRANSLATIONS[lang];
    logActivity(L.logUndo(entry.type==='in'?L.in:L.out, entry.medName, fmtNum(entry.qty,lang)));
    setToast(L.undoneToast, false);
    persist();
    render();
  },
  saveEntry(){
    const { medicines, sheetMedId, entryType, qtyStr, dateStr, lang } = state;
    const qty = parseInt(qtyStr,10)||0;
    if(qty<=0) return;
    if(dateStr > todayISO()) return;
    const idx = medicines.findIndex(m=>m.id===sheetMedId);
    if(idx<0) return;
    const med = medicines[idx];
    const newStock = entryType==='in' ? med.stock+qty : med.stock-qty;
    if(newStock<0) return;
    const entry = { id:'e'+Date.now()+'_'+Math.random().toString(36).slice(2,7), date:dateStr, medId:med.id, medName:med.name, type:entryType, qty, stockAfter:newStock, prevStock:med.stock, createdAt:new Date().toISOString() };
    medicines[idx] = {...med, stock:newStock, usage:med.usage+1};
    state.entries.push(entry);
    state.recentMedIds = [med.id, ...state.recentMedIds.filter(id=>id!==med.id)].slice(0,20);
    state.lastEntryId = entry.id;
    state.sheet = null; state.sheetMedId = null;
    state.query = ''; state.showAllList = false;
    const L = TRANSLATIONS[lang];
    const typeLabel = entryType==='in' ? L.in : L.out;
    logActivity(L.logEntry(typeLabel, med.name, fmtNum(qty,lang), fmtNum(newStock,lang)));
    setToast(L.savedToast(med.name, typeLabel, fmtNum(qty,lang), fmtNum(newStock,lang)), newStock<0);
    focusStack.pop(); // discard the opening trigger — after a save, always return to the search field, cleared, for the next entry
    pendingFocus = '[data-field="query"]';
    persist();
    render();
  },
  saveAddMedicine(){
    const { addName, addStockStr, medicines, lang } = state;
    const name = addName.trim();
    if(!name) return;
    const nn = normalize(name);
    if(medicines.some(m=>normalize(m.name)===nn)){
      state.addError = TRANSLATIONS[lang].dupError;
      render();
      return;
    }
    const stock = parseInt(addStockStr,10)||0;
    const newMed = { id:'m'+Date.now()+'_'+Math.random().toString(36).slice(2,7), name, stock, usage:0 };
    state.medicines.push(newMed);
    const L = TRANSLATIONS[lang];
    logActivity(L.logAdded(name, fmtNum(stock,lang)));
    state.query = ''; state.sheet = 'entry'; state.sheetMedId = newMed.id; state.entryType = 'out'; state.qtyStr = ''; state.dateStr = todayISO(); state.addError = '';
    setToast(L.addedToast(name), false);
    pendingFocus = '[data-field="qty"]';
    persist();
    render();
  },
  saveEditMedicine(){
    const { editMedId, editNameStr, editStockStr, medicines, lang } = state;
    const name = editNameStr.trim();
    if(!name) return;
    const nn = normalize(name);
    if(medicines.some(m=>m.id!==editMedId && normalize(m.name)===nn)){
      state.editError = TRANSLATIONS[lang].dupError;
      render();
      return;
    }
    const idx = medicines.findIndex(m=>m.id===editMedId);
    if(idx<0) return;
    const med = medicines[idx];
    const oldName = med.name, oldStock = med.stock;
    const parsedStock = parseInt(editStockStr,10);
    const finalStock = isNaN(parsedStock) ? med.stock : parsedStock;
    medicines[idx] = {...med, name, stock: finalStock};
    // Shift this medicine's whole entry chain by the same delta, so a later entry edit
    // (which recalculates from the chain's original baseline) doesn't silently discard this correction.
    const delta = finalStock - oldStock;
    if(delta !== 0){
      state.entries.filter(e=>e.medId===editMedId).forEach(e=>{ e.prevStock += delta; e.stockAfter += delta; });
    }
    const L = TRANSLATIONS[lang];
    logActivity(oldName===name
      ? L.logMedEditSame(name, fmtNum(oldStock,lang), fmtNum(finalStock,lang))
      : L.logMedEditRenamed(oldName, name, fmtNum(oldStock,lang), fmtNum(finalStock,lang)));
    state.editSheet = null; state.editMedId = null; state.editError = '';
    setToast(L.editedToast, false);
    pendingFocus = focusStack.pop() || '[data-field="qty"]';
    persist();
    render();
  },
  saveEditEntry(){
    const { editEntryId, editQtyStr, editTypeStr, editDateStr, entries, lang } = state;
    const qty = parseInt(editQtyStr,10)||0;
    if(qty<=0) return;
    if(editDateStr > todayISO()) return;
    const idx = entries.findIndex(e=>e.id===editEntryId);
    if(idx<0) return;
    const e = entries[idx];
    if(!isEditableEntry(e)) return;
    const sim = simulateChain(e.medId, editEntryId, qty, editTypeStr);
    if(sim.minStock<0) return;
    const L = TRANSLATIONS[lang];
    const oldType = e.type==='in' ? L.in : L.out, newType = editTypeStr==='in' ? L.in : L.out;
    const oldQtyDisp = fmtNum(e.qty,lang), newQtyDisp = fmtNum(qty,lang);
    entries[idx] = {...e, qty, type:editTypeStr, date:editDateStr};
    recalcMedicineChain(e.medId);
    logActivity(L.logEntryEdit(e.medName, oldType, oldQtyDisp, newType, newQtyDisp));
    state.editSheet = null; state.editEntryId = null; state.editError = '';
    setToast(L.editedToast, false);
    pendingFocus = focusStack.pop() || (state.dayDrill ? '[data-action="closeDayDrill"]' : '[data-field="dayFilter"]');
    persist();
    render();
  },
};

const FIELD_HANDLERS = {
  query(v){ state.query = v; state.showAllList = false; render(); },
  qty(v){ state.qtyStr = v.replace(/[^0-9]/g,''); render(); },
  date(v){ state.dateStr = v; render(); },
  addName(v){ state.addName = v; state.addError = ''; render(); },
  addStock(v){ state.addStockStr = v.replace(/[^0-9]/g,''); render(); },
  dayFilter(v){ state.dayFilter = v; render(); },
  editName(v){ state.editNameStr = v; state.editError = ''; render(); },
  editStock(v){
    let s = v.replace(/[^0-9-]/g,'');
    s = s[0]==='-' ? '-'+s.slice(1).replace(/-/g,'') : s.replace(/-/g,'');
    state.editStockStr = s; render();
  },
  editQty(v){ state.editQtyStr = v.replace(/[^0-9]/g,''); render(); },
  editDate(v){ state.editDateStr = v; render(); },
};

function onClick(e){
  if(e.target && e.target.id === 'modalOverlay'){ ACTIONS.closeModal(); return; }
  const btn = e.target.closest('[data-action]');
  if(!btn || btn.disabled) return;
  const fn = ACTIONS[btn.dataset.action];
  if(fn) fn(btn.dataset.id);
}
function onFieldChange(e){
  const el = e.target.closest('[data-field]');
  if(!el) return;
  const fn = FIELD_HANDLERS[el.dataset.field];
  if(fn) fn(el.value);
}

function onKeyDown(e){
  if(e.key === 'Escape' && isModalOpen()){
    e.preventDefault();
    ACTIONS.closeModal();
    return;
  }
  if(e.key === 'Enter' && e.target && e.target.dataset){
    const field = e.target.dataset.field;
    if(field === 'qty'){
      const vm = computeVM();
      if(!vm.saveDisabled){ e.preventDefault(); ACTIONS.saveEntry(); }
      return;
    }
    if(field === 'addName'){
      const vm = computeVM();
      if(!vm.addSaveDisabled){ e.preventDefault(); ACTIONS.saveAddMedicine(); }
      return;
    }
    if(field === 'editName'){
      const vm = computeVM();
      if(!vm.editMedSaveDisabled){ e.preventDefault(); ACTIONS.saveEditMedicine(); }
      return;
    }
    if(field === 'editQty'){
      const vm = computeVM();
      if(!vm.editEntrySaveDisabled){ e.preventDefault(); ACTIONS.saveEditEntry(); }
      return;
    }
  }
  if(e.key === 'Tab' && isModalOpen()){
    const panel = app.querySelector('#modalOverlay > div');
    if(!panel) return;
    const focusables = Array.from(panel.querySelectorAll('button:not([disabled]), input'));
    if(focusables.length === 0) return;
    const first = focusables[0], last = focusables[focusables.length-1];
    if(e.shiftKey && document.activeElement === first){
      e.preventDefault(); last.focus();
    } else if(!e.shiftKey && document.activeElement === last){
      e.preventDefault(); first.focus();
    }
  }
}

app.addEventListener('click', onClick);
app.addEventListener('input', onFieldChange);
app.addEventListener('change', onFieldChange);
app.addEventListener('keydown', onKeyDown);

render();
syncFromServer();
setTimeout(()=>{ state.isLoading = false; render(); }, 500);

</script>
</body>
</html>
